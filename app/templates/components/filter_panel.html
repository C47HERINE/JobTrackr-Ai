<div id="filterPanel"
     class="pointer-events-auto fixed inset-x-3 top-[78px] z-50 hidden max-h-[calc(100dvh-110px)] overflow-y-auto rounded-xl3 border border-zinc-200 bg-white p-4 shadow-pop dark:border-zinc-700 dark:bg-zinc-900 md:inset-x-auto md:bottom-auto md:w-[420px] md:max-h-[min(72dvh,680px)]">
    <form method="GET" class="space-y-4">
        <input type="hidden" name="job" value="{{ selected_job_id }}">

        <div class="flex items-start justify-between gap-4">
            <div>
                <div class="text-base font-semibold">Filters</div>
                <div class="text-sm text-zinc-500 dark:text-zinc-400">Refine dashboard results</div>
            </div>
            <a href="{{ url_for('dashboard.index') }}"
               class="text-sm text-zinc-500 transition hover:text-zinc-900 dark:text-zinc-400 dark:hover:text-zinc-100">Reset</a>
        </div>

        <div>
            <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-zinc-500 dark:text-zinc-400">Title</label>
            <div class="relative">
                <i data-lucide="search"
                   class="pointer-events-none absolute left-3 top-3.5 h-4 w-4 text-zinc-400 dark:text-zinc-500"></i>
                <input name="title" value="{{ request.args.get('title','') }}"
                       class="h-11 w-full rounded-2xl border border-zinc-200 bg-zinc-100 pl-10 pr-3 outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-500/15 dark:border-zinc-700 dark:bg-zinc-800"
                       placeholder="Python, support, QA...">
            </div>
        </div>

        <div>
            <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-zinc-500 dark:text-zinc-400">Company</label>
            <div class="relative">
                <i data-lucide="building-2"
                   class="pointer-events-none absolute left-3 top-3.5 h-4 w-4 text-zinc-400 dark:text-zinc-500"></i>
                <input name="company" value="{{ request.args.get('company','') }}"
                       class="h-11 w-full rounded-2xl border border-zinc-200 bg-zinc-100 pl-10 pr-3 outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-500/15 dark:border-zinc-700 dark:bg-zinc-800"
                       placeholder="Company name">
            </div>
        </div>

        <div class="relative" id="cityDropdownWrap">
            <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-zinc-500 dark:text-zinc-400">Cities</label>
            <button id="cityDropdownButton" type="button"
                    class="flex h-11 w-full items-center justify-between rounded-2xl border border-zinc-200 bg-zinc-100 px-3 text-left transition hover:bg-zinc-200 dark:border-zinc-700 dark:bg-zinc-800 dark:hover:bg-zinc-700"
                    aria-expanded="false" aria-controls="cityDropdownPanel">
                <span id="cityDropdownLabel" class="truncate text-zinc-700 dark:text-zinc-200"></span>
                <i data-lucide="chevron-down" class="h-4 w-4 shrink-0 text-zinc-400 dark:text-zinc-500"></i>
            </button>

            <div id="cityDropdownPanel"
                 class="mt-2 hidden w-full rounded-2xl border border-zinc-200 bg-white p-3 shadow-soft dark:border-zinc-700 dark:bg-zinc-900">
                <div class="mb-3 flex items-center justify-between gap-2">
                    <div class="flex items-center gap-2 text-sm font-medium">
                        <i data-lucide="map-pin" class="h-4 w-4 text-blue-600 dark:text-blue-400"></i>
                        <span>Cities</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <button type="button" id="selectAllCitiesButton"
                                class="rounded-full bg-zinc-100 px-2.5 py-1 text-xs text-zinc-800 transition hover:bg-zinc-200 dark:bg-zinc-800 dark:text-zinc-100 dark:hover:bg-zinc-700">
                            All
                        </button>
                        <button type="button" id="selectNoCitiesButton"
                                class="rounded-full bg-zinc-100 px-2.5 py-1 text-xs text-zinc-800 transition hover:bg-zinc-200 dark:bg-zinc-800 dark:text-zinc-100 dark:hover:bg-zinc-700">
                            None
                        </button>
                    </div>
                </div>

                <div class="max-h-[min(42dvh,420px)] space-y-2 overflow-y-auto pr-1 md:max-h-[360px]">
                    {% for city in cities %}
                    <label class="flex items-center gap-2 rounded-xl px-2 py-2 text-sm transition hover:bg-zinc-100 dark:hover:bg-zinc-800">
                        <input type="checkbox" name="city" value="{{ city }}"
                               class="h-4 w-4 accent-blue-600 dark:accent-blue-500"
                               {% if not selected_cities or city in selected_cities %}checked{% endif %}>
                        <span>{{ city }}</span>
                    </label>
                    {% endfor %}
                </div>
            </div>
        </div>

        <div>
            <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-zinc-500 dark:text-zinc-400">Applied status</label>
            <select name="applied"
                    class="h-11 w-full rounded-2xl border border-zinc-200 bg-zinc-100 px-3 outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-500/15 dark:border-zinc-700 dark:bg-zinc-800">
                <option value="">All</option>
                <option value="yes" {% if request.args.get('applied') == 'yes' %}selected{% endif %}>Applied</option>
                <option value="no" {% if request.args.get('applied') == 'no' %}selected{% endif %}>Not applied</option>
            </select>
        </div>

        <div>
            <label class="mb-2 block text-xs font-medium uppercase tracking-wide text-zinc-500 dark:text-zinc-400">Decision</label>
            <div class="flex flex-wrap gap-2">
                <input type="hidden" name="decision" id="filterDecisionInput" value="{{ selected_decision }}">

                <button type="button" data-decision-value=""
                        class="rounded-full px-3 py-2 text-sm transition {% if selected_decision == '' %}bg-blue-600 text-white dark:bg-blue-500{% else %}bg-blue-50 text-blue-700 hover:bg-blue-100 dark:bg-blue-500/10 dark:text-blue-300 dark:hover:bg-blue-500/15{% endif %}">
                    All
                </button>
                <button type="button" data-decision-value="apply"
                        class="rounded-full px-3 py-2 text-sm transition {% if selected_decision == 'apply' %}bg-green-600 text-white dark:bg-green-500{% else %}bg-green-50 text-green-700 hover:bg-green-100 dark:bg-green-500/10 dark:text-green-300 dark:hover:bg-green-500/15{% endif %}">
                    Apply
                </button>
                <button type="button" data-decision-value="pass"
                        class="rounded-full px-3 py-2 text-sm transition {% if selected_decision == 'pass' %}bg-red-600 text-white dark:bg-red-500{% else %}bg-red-50 text-red-700 hover:bg-red-100 dark:bg-red-500/10 dark:text-red-300 dark:hover:bg-red-500/15{% endif %}">
                    Pass
                </button>
                <button type="button" data-decision-value="applied"
                        class="rounded-full px-3 py-2 text-sm transition {% if selected_decision == 'applied' %}bg-sky-600 text-white dark:bg-sky-500{% else %}bg-sky-50 text-sky-700 hover:bg-sky-100 dark:bg-sky-500/10 dark:text-sky-300 dark:hover:bg-sky-500/15{% endif %}">
                    Applied
                </button>
            </div>
        </div>

        <div class="flex items-center justify-end gap-2 border-t border-zinc-200 pt-4 dark:border-zinc-700">
            <a href="{{ url_for('dashboard.index') }}"
               class="inline-flex h-10 items-center rounded-full border border-zinc-200 bg-zinc-100 px-4 text-sm text-zinc-800 transition hover:bg-zinc-200 dark:border-zinc-700 dark:bg-zinc-800 dark:text-zinc-100 dark:hover:bg-zinc-700">Clear</a>
            <button type="submit"
                    class="inline-flex h-10 items-center rounded-full bg-blue-600 px-4 text-sm font-medium text-white transition hover:brightness-110 dark:bg-blue-500">
                Apply Filters
            </button>
        </div>
    </form>
</div>
