<header class="relative shrink-0 px-3 py-3 md:px-5">
    <div class="flex items-start justify-between gap-3">
        <div class="min-w-0 flex items-center gap-3 flex-1">
            <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl bg-blue-100 text-blue-600 dark:bg-blue-500/15 dark:text-blue-400">
                <i data-lucide="briefcase-business" class="h-5 w-5"></i>
            </div>

            <div class="min-w-0">
                <div class="truncate text-xs font-medium text-zinc-500 dark:text-zinc-400">JobTrackr AI</div>
                <div class="truncate text-base font-semibold tracking-tight">Dashboard</div>
            </div>
        </div>

        <div class="grid shrink-0 grid-cols-2 gap-x-4 gap-y-1 text-xs text-right sm:gap-x-5 sm:text-sm md:flex md:flex-wrap md:items-center md:justify-end md:gap-x-5 md:gap-y-2">
            <div>
                <span class="text-zinc-500 dark:text-zinc-400">Total</span>
                <span class="ml-2 font-semibold">{{ stats.total }}</span>
            </div>
            <div>
                <span class="text-green-600 dark:text-green-400">Apply</span>
                <span class="ml-2 font-semibold text-green-600 dark:text-green-400">{{ stats.apply }}</span>
            </div>
            <div>
                <span class="text-red-600 dark:text-red-400">Pass</span>
                <span class="ml-2 font-semibold text-red-600 dark:text-red-400">{{ stats.pass }}</span>
            </div>
            <div>
                <span class="text-blue-600 dark:text-blue-400">Applied</span>
                <span class="ml-2 font-semibold text-blue-600 dark:text-blue-400">{{ stats.applied }}</span>
            </div>
        </div>
    </div>
</header>
